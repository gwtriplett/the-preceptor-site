<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Intake Review — The Preceptor Site (Staff)</title>
<style>
  :root{
    --ink:#1A1A2E; --muted:#5F5E5A;
    --blue-600:#1A73C8; --blue-500:#1A73C8; --cyan-400:#00B4D8;
    --bg:#F4F6FA; --card:#FFFFFF; --border:#E8EBF0;
    --danger:#A32D2D; --success:#3B6D11;
    --radius:10px;
    --gradient: linear-gradient(135deg, #1A73C8 0%, #00B4D8 100%);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);}
  .page{max-width:920px;margin:0 auto;padding:28px 20px 80px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:34px;height:34px;border-radius:9px;background:var(--gradient);display:flex;align-items:center;justify-content:center;}
  .brand-mark svg{width:19px;height:19px;}
  .brand-text{font-weight:800;font-size:16px;letter-spacing:-0.02em;}
  .brand-text span{background:var(--gradient);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .topbar-actions{display:flex;gap:8px;}
  button{font-family:inherit;font-size:13.5px;font-weight:700;border:none;border-radius:9px;padding:9px 16px;cursor:pointer;}
  .btn-primary{background:var(--gradient);color:#fff;}
  .btn-ghost{background:#fff;border:1px solid var(--border);color:var(--ink);}
  .btn-ghost:hover{background:var(--bg);}
  .btn-sm{padding:7px 12px;font-size:12.5px;}

  /* Login gate */
  .gate{max-width:360px;margin:100px auto;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:28px;text-align:center;box-shadow:0 8px 24px rgba(15,23,42,.06);}
  .gate input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;font-size:14px;margin:14px 0;text-align:center;}
  .gate p.err{color:var(--danger);font-size:13px;display:none;}

  #app{display:none;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px;box-shadow:0 1px 3px rgba(15,23,42,.04);}
  .empty{text-align:center;color:var(--muted);padding:60px 20px;}

  .sub-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .sub-header h2{font-size:16px;margin:0;}
  .count-pill{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 12px;font-size:12.5px;font-weight:700;color:var(--blue-600);}

  .row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;}
  .name{font-weight:800;font-size:15.5px;}
  .meta{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:#FEF9C3;color:#854D0E;white-space:nowrap;}

  .details-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px;font-size:13px;}
  @media(max-width:640px){.details-grid{grid-template-columns:1fr 1fr;}}
  .details-grid div span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}

  .actions{display:flex;gap:8px;margin-top:16px;}

  /* Draft panel */
  .draft-panel{display:none;margin-top:16px;border-top:1px dashed var(--border);padding-top:16px;}
  .draft-panel.open{display:block;}
  .draft-panel label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
  .draft-panel input[type=text]{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13.5px;margin-bottom:12px;font-family:inherit;}
  .draft-panel textarea{width:100%;min-height:260px;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:13.5px;font-family:inherit;line-height:1.55;}

  /* Settings modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.4);align-items:center;justify-content:center;z-index:50;}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:var(--radius);padding:24px;width:420px;max-width:90vw;}
  .modal h3{margin:0 0 6px;font-size:16px;}
  .modal p.sub{color:var(--muted);font-size:12.5px;margin:0 0 16px;}
  .modal label{display:block;font-size:12.5px;font-weight:700;margin-bottom:5px;}
  .modal input{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:13.5px;margin-bottom:14px;}
  .modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:6px;}
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div class="gate" id="gate">
  <div class="brand-mark" style="margin:0 auto 12px;">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
      <path d="M6 9.5V15c0 1.5 2.7 3 6 3s6-1.5 6-3V9.5" stroke="white" stroke-width="1.6"/>
    </svg>
  </div>
  <div style="font-weight:800;">Staff Intake Review</div>
  <div style="color:var(--muted);font-size:13px;margin-top:4px;">Enter your staff password to continue</div>
  <input type="password" id="pwInput" placeholder="Staff password" />
  <p class="err" id="pwErr">Incorrect password.</p>
  <button class="btn-primary" style="width:100%;" onclick="tryLogin()">Log In</button>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M6 9.5V15c0 1.5 2.7 3 6 3s6-1.5 6-3V9.5" stroke="white" stroke-width="1.6"/>
          </svg>
        </div>
        <div class="brand-text">THE PRECEPTOR <span>SITE</span> — Intake Review</div>
      </div>
      <div class="topbar-actions">
        <button class="btn-ghost" onclick="loadSubmissions()">↻ Refresh</button>
      </div>
    </div>

    <div class="sub-header">
      <h2>New submissions awaiting follow-up</h2>
      <span class="count-pill" id="countPill">0</span>
    </div>

    <div id="list"></div>
  </div>
</div>

<script>
/* ============================================================
   STAFF PASSWORD
   This must match the STAFF_PASSWORD environment variable set
   in Netlify (Site settings > Environment variables) — that's
   what the airtable-write function checks before allowing any
   changes. If you change one, change the other to match.
   ============================================================ */
const STAFF_PASSWORD = "ChangeMe123!";
let staffPasswordEntered = "";

function tryLogin(){
  const val = document.getElementById('pwInput').value;
  if(val === STAFF_PASSWORD){
    staffPasswordEntered = val;
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadSubmissions();
  } else {
    document.getElementById('pwErr').style.display = 'block';
  }
}
document.getElementById('pwInput').addEventListener('keydown', e=>{ if(e.key === 'Enter') tryLogin(); });

const STUDENTS_BASE_ID = 'appf6D9Nbhb5Wg43L';
const STUDENTS_TABLE_ID = 'tblesg1u5m2ec3cgg';

let currentRecords = [];

async function loadSubmissions(){
  const list = document.getElementById('list');
  list.innerHTML = '<div class="empty">Loading…</div>';

  const formula = encodeURIComponent(`OR({Pipeline Status}="🟡 Inquiry Received", {Admission Status}="Application Received")`);
  const path = `?filterByFormula=${formula}&sort%5B0%5D%5Bfield%5D=Intake%20Timestamp&sort%5B0%5D%5Bdirection%5D=desc`;

  try{
    const resp = await fetch('/.netlify/functions/airtable-read', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ base: STUDENTS_BASE_ID, table: STUDENTS_TABLE_ID, path })
    });
    const data = await resp.json();
    if(!resp.ok){ throw new Error(data?.error || `Server error (${resp.status})`); }
    currentRecords = data.records || [];
    renderList();
  } catch(err){
    list.innerHTML = `<div class="empty">${err.message}</div>`;
  }
}

function renderList(){
  const list = document.getElementById('list');
  document.getElementById('countPill').textContent = currentRecords.length;
  if(currentRecords.length === 0){
    list.innerHTML = '<div class="empty">No new submissions right now. New intake form entries will show up here automatically.</div>';
    return;
  }
  list.innerHTML = currentRecords.map(rec => cardHtml(rec)).join('');
}

function cardHtml(rec){
  const f = rec.fields;
  return `
    <div class="card" id="card-${rec.id}">
      <div class="row-top">
        <div>
          <div class="name">${f['First Name']||''} ${f['Last Name']||''}</div>
          <div class="meta">${f['University / College']||'—'} · ${f['Degree / Program']||'—'}</div>
        </div>
        <span class="badge">${(f['Admission Status']||[])[0] || f['Pipeline Status'] || 'New'}</span>
      </div>
      <div class="details-grid">
        <div><span>Email</span>${f['Email']||'—'}</div>
        <div><span>Phone</span>${f['Phone Number']||'—'}</div>
        <div><span>Student ID</span>${f['Student ID']||'—'}</div>
        <div><span>Rotation dates</span>${f['Requested Start Date']||'?'} – ${f['Requested End Date']||'?'}</div>
        <div><span>Hours requested</span>${f['Total Hours Required']||'—'}</div>
        <div><span>Submitted</span>${f['Intake Timestamp'] ? new Date(f['Intake Timestamp']).toLocaleString() : '—'}</div>
      </div>
      <div class="actions">
        <button class="btn-primary btn-sm" onclick="toggleDraft('${rec.id}')">✉ Draft Follow-Up Email</button>
        <button class="btn-ghost btn-sm" onclick="markContacted('${rec.id}')">Mark as Contacted</button>
      </div>
      <div class="draft-panel" id="draft-${rec.id}">
        <label>Subject</label>
        <input type="text" id="subj-${rec.id}" />
        <label>Body</label>
        <textarea id="body-${rec.id}"></textarea>
        <div class="actions">
          <button class="btn-primary btn-sm" onclick="openInMail('${rec.id}')">Open in Mail →</button>
        </div>
      </div>
    </div>
  `;
}

function fmtDate(d){
  if(!d) return 'your requested date';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
}

function buildFollowUpEmail(f){
  const first = f['First Name'] || 'there';
  const university = f['University / College'] || 'your program';
  const start = fmtDate(f['Requested Start Date']);
  const end = fmtDate(f['Requested End Date']);
  const hours = f['Total Hours Required'] || '—';

  const subject = "Your Preceptorship Request Has Been Received — Agreement & Invoice On the Way";

  const body =
`Hi ${first},

Thank you for completing your intake form — we've received your information and are excited to move forward with your preceptorship here at TMM Medical Group / The Preceptor Site!

Here's a quick overview of what to expect over the next few days:

1. Agreement for Review & Signature
We'll send your Preceptorship Agreement via DocuSign shortly. Please review it carefully before signing. Key terms include:
   - Preceptorship fee: $10 per clinical hour (payment due in full before your start date)
   - A 2% processing fee applies to all credit card payments
   - Your requested rotation: ${start} – ${end} (${hours} hours)

2. Invoice
Once your agreement is signed, we'll send an invoice reflecting your total hours and fee.

3. Meeting Dr. Cooper
Before your rotation begins, Dr. Cooper likes to meet each student — to make introductions, walk you through the team and clinic, and confirm your dates.

A few things to have ready before your start date:
   - Proof of immunizations
   - Current background check
   - Proof of professional liability insurance
   - Your school's clinical objectives or handbook, if you haven't already shared it

If you have any questions in the meantime, just reply to this email. We're looking forward to having you with us, ${university.includes('University') || university.includes('College') ? 'and at ' + university : ''}!

Warm regards,
Gerald
Preceptorship Coordinator — TMM Medical Group | The Preceptor Site
3520 High Street, Suite 100, Portsmouth, VA 23707`;

  return { subject, body };
}

function toggleDraft(id){
  const panel = document.getElementById(`draft-${id}`);
  const isOpen = panel.classList.contains('open');
  if(isOpen){ panel.classList.remove('open'); return; }

  const rec = currentRecords.find(r => r.id === id);
  const { subject, body } = buildFollowUpEmail(rec.fields);
  document.getElementById(`subj-${id}`).value = subject;
  document.getElementById(`body-${id}`).value = body;
  panel.classList.add('open');
}

function openInMail(id){
  const rec = currentRecords.find(r => r.id === id);
  const to = rec.fields['Email'] || '';
  const subject = document.getElementById(`subj-${id}`).value;
  const body = document.getElementById(`body-${id}`).value;
  const mailto = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;
}

async function markContacted(id){
  try{
    const resp = await fetch('/.netlify/functions/airtable-write', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        staffPassword: staffPasswordEntered,
        base: STUDENTS_BASE_ID,
        table: STUDENTS_TABLE_ID,
        method: 'PATCH',
        body: { records: [{ id, fields: { "Admission Status": ["Under Review"] } }], typecast: true }
      })
    });
    const data = await resp.json();
    if(!resp.ok) throw new Error(data?.error || 'Update failed');
    currentRecords = currentRecords.filter(r => r.id !== id);
    renderList();
  } catch(err){
    alert("Couldn't update this record: " + err.message);
  }
}
</script>
</body>
</html>
